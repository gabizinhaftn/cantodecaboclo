<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detalhes | Fio de Axé</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 p-6">
    <div id="detalhe-produto" class="max-w-4xl mx-auto bg-white p-8 border border-stone-100 shadow-sm">
        </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));
        const p = PRODUTOS.find(prod => prod.id === id);

        if (p) {
            document.getElementById('detalhe-produto').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <img src="${p.imagem_url}" class="w-full shadow-lg">
                    <div>
                        <h1 class="text-3xl font-bold uppercase mb-4">${p.nome}</h1>
                        <p class="text-2xl text-stone-800 mb-6">R$ ${p.preco.toFixed(2)}</p>
                        <p class="text-stone-600 italic mb-8">${p.descricao}</p>
                        <button onclick="adicionarAoCarrinho(${p.id})" class="w-full bg-stone-800 text-white py-4 font-bold uppercase tracking-widest hover:bg-black transition">
                            Adicionar à Sacola
                        </button>
                        <a href="index.html" class="block text-center mt-4 text-xs uppercase text-stone-400">Voltar</a>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
